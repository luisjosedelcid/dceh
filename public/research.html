<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCE Holdings — Workflow</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#1b2642;--gold:#b88b47;--gold-lt:#d4aa6a;--gold-dim:rgba(184,139,71,0.10);--gold-rule:rgba(184,139,71,0.30);
    --cream:#f5f1eb;--white:#ffffff;--ink:#1b2642;--gray-mid:#8a9098;--gray-txt:#606060;
    --green:#2a7a56;--red:#9b2335;--amber:#b8860b;--rule:rgba(27,38,66,0.09);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);font-family:'Archivo','Helvetica Neue',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}

  header{background:var(--navy);border-bottom:2px solid var(--gold);padding:0 48px;display:flex;align-items:center;min-height:64px;justify-content:space-between}
  .logo{font-size:20px;font-weight:700;color:var(--white)}.logo span{color:var(--gold);font-weight:300}
  .hnav{display:flex;gap:8px;align-items:center}
  .hnav a{font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;padding:8px 16px;color:rgba(255,255,255,0.5);text-decoration:none;border:1px solid transparent;transition:all .2s}
  .hnav a:hover{color:var(--gold);border-color:var(--gold-rule)}
  .hnav a.active{color:var(--gold);border-color:var(--gold)}

  main{padding:28px 36px 60px}
  .slbl{font-size:9px;font-weight:500;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:10px}
  .slbl::before{content:'';width:24px;height:1px;background:var(--gold)}
  h1{font-size:34px;font-weight:300;letter-spacing:-0.02em;margin-bottom:6px}
  .subtitle{color:var(--gray-txt);font-size:13px;margin-bottom:24px;max-width:760px}

  .gate{max-width:520px;margin:80px auto;padding:48px 40px;background:var(--white);border:1px solid var(--rule);text-align:center}
  .gate h2{font-size:22px;font-weight:400;margin-bottom:8px}
  .gate p{color:var(--gray-txt);font-size:13px;margin-bottom:24px;line-height:1.6}
  .gate .gh-btn{display:inline-flex;align-items:center;gap:10px;padding:12px 24px;background:var(--navy);color:var(--white);border:none;font-family:inherit;font-size:12px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:all .2s}
  .gate .gh-btn:hover{background:#0d1428}

  /* PRE-FILL BANNER (when coming from Idea Feed) */
  .prefill-banner{background:var(--gold-dim);border:1px solid var(--gold-rule);border-left:3px solid var(--gold);padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--ink)}
  .prefill-banner strong{color:var(--gold);letter-spacing:0.05em}
  .prefill-banner .pf-close{background:none;border:none;color:var(--gray-mid);font-size:18px;cursor:pointer;line-height:1}
  .prefill-banner .pf-close:hover{color:var(--ink)}

  /* ADD ROW */
  .add-row{display:grid;grid-template-columns:120px 1fr 2fr 110px;gap:10px;margin-bottom:18px;background:var(--white);padding:10px;border:1px solid var(--rule)}
  .add-inp{padding:10px 12px;border:1px solid var(--rule);font-family:inherit;font-size:13px;background:var(--cream);outline:none}
  .add-inp:focus{border-color:var(--gold);background:var(--white)}
  .add-inp.ticker{font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
  .add-btn{padding:10px;background:var(--navy);color:var(--white);border:none;font-family:inherit;font-size:11px;letter-spacing:0.15em;font-weight:500;text-transform:uppercase;cursor:pointer;transition:.2s}
  .add-btn:hover{background:#0d1428}
  .add-btn:disabled{opacity:.4;cursor:not-allowed}

  .stats{display:flex;gap:24px;margin-bottom:18px;font-size:11px;color:var(--gray-txt);letter-spacing:0.05em}
  .stats strong{color:var(--ink);font-weight:600;margin-right:4px}

  /* KANBAN */
  .kanban{display:grid;grid-template-columns:repeat(6,minmax(220px,1fr));gap:14px}
  .col{background:var(--white);border-top:2px solid var(--gold);min-height:300px;display:flex;flex-direction:column}
  .col-h{padding:14px 14px 8px;border-bottom:1px solid var(--rule)}
  .col-h .ttl{font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink);margin-bottom:2px}
  .col-h .cnt{font-size:10px;color:var(--gray-mid);letter-spacing:0.05em}
  .col-body{padding:10px;flex:1;display:flex;flex-direction:column;gap:8px;min-height:80px;transition:background .2s}
  .col-body.drag-over{background:var(--gold-dim)}

  /* CARD */
  .card{background:var(--white);border:1px solid var(--rule);padding:12px;cursor:grab;transition:all .2s;position:relative}
  .card:hover{border-color:var(--gold-rule);box-shadow:0 1px 4px rgba(27,38,66,0.06)}
  .card.dragging{opacity:.4;cursor:grabbing}
  .card-tk{font-size:15px;font-weight:700;letter-spacing:0.03em;color:var(--ink);margin-bottom:1px}
  .card-nm{font-size:11px;color:var(--gray-txt);margin-bottom:8px}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .b{font-size:9px;font-weight:600;letter-spacing:0.05em;padding:2px 6px;border-radius:2px}
  .b.q{background:rgba(42,122,86,0.1);color:var(--green)}
  .b.v{background:rgba(184,134,11,0.12);color:var(--amber)}
  .b.irr{background:var(--gold-dim);color:var(--gold)}
  .card-nt{font-size:11px;color:var(--gray-txt);line-height:1.45;margin-bottom:8px;font-style:italic;white-space:pre-wrap;word-break:break-word}
  .card-meta{display:flex;justify-content:space-between;align-items:center;font-size:9px;color:var(--gray-mid);letter-spacing:0.03em;border-top:1px dashed var(--rule);padding-top:6px}
  .card-meta .comments-cnt{display:inline-flex;align-items:center;gap:3px;color:var(--gold);font-weight:500}
  .card-x{position:absolute;top:6px;right:6px;background:none;border:none;cursor:pointer;color:var(--gray-mid);font-size:14px;padding:2px 6px;line-height:1;opacity:0;transition:.2s}
  .card:hover .card-x{opacity:1}
  .card-x:hover{color:var(--red)}

  /* MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(27,38,66,0.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:var(--white);max-width:640px;width:100%;max-height:88vh;display:flex;flex-direction:column;border-top:3px solid var(--gold);overflow-y:auto}
  .modal-h{padding:20px 24px 16px;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;align-items:flex-start}
  .modal-h .tkr{font-size:22px;font-weight:700;letter-spacing:0.02em;margin-bottom:1px}
  .modal-h .nm{font-size:12px;color:var(--gray-txt);margin-bottom:8px}
  .modal-h .badges{margin-bottom:0}
  .modal-h .close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray-mid);line-height:1}
  .modal-h .close:hover{color:var(--ink)}

  .modal-section{padding:18px 24px;border-bottom:1px solid var(--rule)}
  .modal-section:last-child{border-bottom:none}
  .modal-section h4{font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
  .note-edit{width:100%;padding:10px;border:1px solid var(--rule);font-family:inherit;font-size:12px;background:var(--cream);outline:none;resize:vertical;min-height:60px}
  .note-edit:focus{border-color:var(--gold);background:var(--white)}
  .save-note{margin-top:8px;padding:6px 12px;background:var(--navy);color:var(--white);border:none;font-family:inherit;font-size:10px;letter-spacing:0.15em;font-weight:500;text-transform:uppercase;cursor:pointer}
  .save-note:hover{background:#0d1428}
  .save-note.saved{background:var(--green)}

  .comments-list{display:flex;flex-direction:column;gap:14px;max-height:320px;overflow-y:auto;padding-right:4px}
  .comment{display:flex;gap:10px;align-items:flex-start}
  .comment .avatar-circle{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:var(--navy);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;letter-spacing:0.02em}
  .comment-body{flex:1;background:var(--cream);padding:10px 12px;border:1px solid var(--rule);border-radius:2px}
  .comment-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
  .comment-h .auth{font-size:11px;font-weight:600;color:var(--ink)}
  .comment-h .when{font-size:9px;color:var(--gray-mid);letter-spacing:0.03em}
  .comment-text{font-size:12px;color:var(--ink);line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .comment-del{background:none;border:none;color:var(--gray-mid);font-size:10px;cursor:pointer;margin-top:4px;padding:0}
  .comment-del:hover{color:var(--red)}
  .no-comments{font-size:11px;color:var(--gray-mid);font-style:italic;text-align:center;padding:20px 0}

  .comment-form{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--rule)}
  .comment-form textarea{flex:1;padding:10px;border:1px solid var(--rule);font-family:inherit;font-size:12px;background:var(--cream);outline:none;resize:vertical;min-height:50px;line-height:1.5}
  .comment-form textarea:focus{border-color:var(--gold);background:var(--white)}
  .comment-form button{padding:0 16px;background:var(--gold);color:var(--white);border:none;font-family:inherit;font-size:10px;letter-spacing:0.15em;font-weight:500;text-transform:uppercase;cursor:pointer;align-self:stretch}
  .comment-form button:hover{background:var(--gold-lt)}
  .comment-form button:disabled{opacity:.4;cursor:not-allowed}

  footer{border-top:1px solid var(--rule);padding:24px 48px;display:flex;justify-content:space-between;font-size:10px;color:var(--gray-mid);letter-spacing:0.05em}

  .loading{text-align:center;padding:60px;color:var(--gray-mid);font-size:12px;letter-spacing:0.05em}
</style>
<link rel="stylesheet" href="/responsive.css"><script src="/dce-auth.js" defer></script>
</head>
<body>

<header>
  <div class="logo">DCE <span>Holdings</span></div>
  <nav class="hnav">
      <a href="/">Home</a>
      <a href="/cockpit.html">Cockpit</a>
      <a href="/universe.html">Universe</a>
      <a href="/screener.html">Find</a>
      <a href="/study.html">Study</a>
      <a href="/journal.html">Journal</a>
      <a href="/portfolio.html">Portfolio</a>
      <a href="/news.html">News</a>
      <a href="/dataroom.html">Data Room</a>
      <a href="/reporting.html">Reporting</a>
      <a href="/performance.html">Performance</a>
      <a href="/research.html" class="active">Research</a>
      <a href="/calendar.html">Calendar</a>
    </nav>
</header>

<main id="main-content">
  <div class="loading">Loading…</div>
</main>

<footer>
  <span>DCE Holdings Investment Office — Confidential · Internal use only</span>
  <span>Workflow · Pipeline kanban</span>
</footer>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const COLUMNS = [
  { id: 'backlog',  title: 'Backlog',          desc: 'On the radar' },
  { id: 'analysis', title: 'Analysis',         desc: 'Active research' },
  { id: 'review',   title: 'Review',           desc: 'Model & thesis review' },
  { id: 'decision', title: 'Decision Pending', desc: 'Awaiting CIO decision' },
  { id: 'approved', title: 'Approved',         desc: 'Thesis approved' },
  { id: 'rejected', title: 'Rejected',         desc: 'Not pursuing' },
];

let currentUser = null;   // { username, name }
let pipeline = [];
let commentsByCard = {};
let dragId = null;
let openCardId = null;
let prefill = null;       // { ticker, name, note } from query string

// ============================================================
// AUTH HELPERS (uses window.dceAuth from /dce-auth.js)
// ============================================================
function authToken() { return window.dceAuth ? window.dceAuth.token() : null; }
function authUser()  { return window.dceAuth ? window.dceAuth.user()  : null; }

async function api(path, opts = {}) {
  const tk = authToken();
  if (!tk) throw new Error('Not authenticated');
  const headers = Object.assign(
    { 'Content-Type': 'application/json', 'x-admin-token': tk },
    opts.headers || {}
  );
  const r = await fetch(path, Object.assign({}, opts, { headers }));
  const ct = r.headers.get('content-type') || '';
  const data = ct.includes('application/json') ? await r.json().catch(() => ({})) : {};
  if (!r.ok) {
    const err = new Error(data.error || `HTTP ${r.status}`);
    err.status = r.status; err.payload = data;
    throw err;
  }
  return data;
}

// ============================================================
// BOOT
// ============================================================
async function boot() {
  // Wait for dce-auth.js (defer) to be ready
  if (!window.dceAuth) {
    setTimeout(boot, 50);
    return;
  }

  // Read pre-fill query string (from Idea Feed)
  const qs = new URLSearchParams(window.location.search);
  if (qs.get('ticker') || qs.get('name')) {
    prefill = {
      ticker: (qs.get('ticker') || '').toUpperCase().slice(0, 8),
      name:   qs.get('name') || '',
      note:   qs.get('note') || '',
    };
  }

  // Auth gate
  if (!window.dceAuth.isAdmin()) {
    renderGate();
    // When user logs in via the global modal, re-boot
    window.dceAuth.onChange((adm) => { if (adm) boot(); });
    return;
  }

  const u = authUser();
  currentUser = {
    username: (u && u.email) || 'admin',
    name:     (u && (u.displayName || u.name)) || (u && u.email) || 'Admin',
  };

  try {
    await loadPipeline();
    renderApp();
  } catch (e) {
    console.error(e);
    document.getElementById('main-content').innerHTML =
      `<div class="loading">Error cargando workflow: ${esc(e.message)}</div>`;
  }
}

function renderGate() {
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="gate">
      <div class="slbl" style="justify-content:center">DCE Holdings — Investment Office</div>
      <h2>Workflow</h2>
      <p>Acceso restringido. Inicia sesión con tu cuenta DCE para acceder al pipeline.</p>
      <button class="gh-btn" onclick="window.dceAuth.openLoginModal()">Iniciar sesión</button>
    </div>
  `;
}

// ============================================================
// DATA LOADING
// ============================================================
async function loadPipeline() {
  const cardsResp = await api('/api/admin/pipeline-cards');
  pipeline = Array.isArray(cardsResp) ? cardsResp : (cardsResp.items || []);

  const commentsResp = await api('/api/admin/pipeline-comments');
  const list = Array.isArray(commentsResp) ? commentsResp : (commentsResp.items || []);
  commentsByCard = {};
  list.forEach(c => {
    if (!commentsByCard[c.card_id]) commentsByCard[c.card_id] = [];
    commentsByCard[c.card_id].push(c);
  });
}

// ============================================================
// MAIN APP RENDER
// ============================================================
function renderApp() {
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="slbl">DCE Holdings — Investment Office</div>
    <h1>Workflow</h1>
    <p class="subtitle">Drag cards between stages. Click a card to view notes and comments. Sync vía Supabase — multi-usuario en tiempo real.</p>

    <div id="prefill-slot"></div>

    <div class="add-row">
      <input class="add-inp ticker" id="add-ticker" placeholder="TICKER" maxlength="8" value="${esc(prefill?.ticker || '')}">
      <input class="add-inp name" id="add-name" placeholder="Company name" value="${esc(prefill?.name || '')}">
      <input class="add-inp note" id="add-note" placeholder="Initial note (optional)" value="${esc(prefill?.note || '')}">
      <button class="add-btn" onclick="addCard()">+ Add</button>
    </div>

    <div class="stats" id="stats"></div>
    <div class="kanban" id="kanban"></div>
  `;

  // Pre-fill banner if coming from Idea Feed
  if (prefill && (prefill.ticker || prefill.name)) {
    const slot = document.getElementById('prefill-slot');
    slot.innerHTML = `
      <div class="prefill-banner">
        <span><strong>Idea desde feed:</strong> ${esc(prefill.ticker || '')}${prefill.name ? ' · ' + esc(prefill.name) : ''} — revisa y pulsa <em>+ Add</em>.</span>
        <button class="pf-close" onclick="dismissPrefill()" title="Descartar">×</button>
      </div>
    `;
  }

  renderBoard();
}

function dismissPrefill() {
  prefill = null;
  // Clean URL
  if (window.history && window.history.replaceState) {
    window.history.replaceState({}, document.title, window.location.pathname);
  }
  document.getElementById('prefill-slot').innerHTML = '';
  document.getElementById('add-ticker').value = '';
  document.getElementById('add-name').value = '';
  document.getElementById('add-note').value = '';
}

function renderBoard() {
  const total = pipeline.length;
  const inPipe = pipeline.filter(c => !['approved','rejected'].includes(c.stage)).length;
  const approved = pipeline.filter(c => c.stage === 'approved').length;
  document.getElementById('stats').innerHTML =
    `<span><strong>${total}</strong>total</span>
     <span><strong>${inPipe}</strong>in pipeline</span>
     <span><strong>${approved}</strong>approved</span>`;

  const k = document.getElementById('kanban');
  k.innerHTML = COLUMNS.map(col => {
    const cards = pipeline.filter(c => c.stage === col.id);
    return `
      <div class="col">
        <div class="col-h">
          <div class="ttl">${col.title}</div>
          <div class="cnt">${cards.length} card${cards.length === 1 ? '' : 's'}</div>
        </div>
        <div class="col-body" data-stage="${col.id}"
             ondragover="dragOver(event)"
             ondragleave="dragLeave(event)"
             ondrop="drop(event,'${col.id}')">
          ${cards.map(cardHTML).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function cardHTML(c) {
  const cmtCount = (commentsByCard[c.id] || []).length;
  const badges = [];
  if (c.quality != null)   badges.push(`<span class="b q">Q ${c.quality}</span>`);
  if (c.valuation != null) badges.push(`<span class="b v">V ${c.valuation}</span>`);
  if (c.irr)               badges.push(`<span class="b irr">IRR ${esc(c.irr)}</span>`);

  const created = c.created_at ? fmtDate(c.created_at) : '';
  const moved   = c.moved_at   ? fmtDate(c.moved_at)   : '';
  const movedShown = (moved && moved !== created) ? ' · Moved ' + moved : '';

  return `
    <div class="card" draggable="true" data-id="${c.id}"
         ondragstart="dragStart(event,'${c.id}')"
         ondragend="dragEnd(event)"
         onclick="openModal('${c.id}')">
      <button class="card-x" onclick="event.stopPropagation();deleteCard('${c.id}')" title="Delete">×</button>
      <div class="card-tk">${esc(c.ticker)}</div>
      <div class="card-nm">${esc(c.name)}</div>
      ${badges.length ? `<div class="badges">${badges.join('')}</div>` : ''}
      ${c.note ? `<div class="card-nt">${esc(c.note)}</div>` : ''}
      <div class="card-meta">
        <span>${created ? 'Added ' + created + movedShown : ''}</span>
        ${cmtCount > 0 ? `<span class="comments-cnt">[${cmtCount}]</span>` : ''}
      </div>
    </div>
  `;
}

// ============================================================
// CARD CRUD
// ============================================================
async function addCard() {
  const tk = document.getElementById('add-ticker').value.trim().toUpperCase();
  const nm = document.getElementById('add-name').value.trim();
  const nt = document.getElementById('add-note').value.trim();
  if (!tk || !nm) { alert('Ticker y nombre requeridos'); return; }

  try {
    const resp = await api('/api/admin/pipeline-cards', {
      method: 'POST',
      body: JSON.stringify({ ticker: tk, name: nm, stage: 'backlog', note: nt || null }),
    });
    const data = resp.item || resp;
    pipeline.unshift(data);
    document.getElementById('add-ticker').value = '';
    document.getElementById('add-name').value = '';
    document.getElementById('add-note').value = '';
    if (prefill) dismissPrefill();
    renderBoard();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function deleteCard(id) {
  const c = pipeline.find(x => x.id === id);
  if (!c) return;
  if (!confirm(`¿Eliminar ${c.ticker} del pipeline?`)) return;

  try {
    await api(`/api/admin/pipeline-cards?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
    pipeline = pipeline.filter(x => x.id !== id);
    delete commentsByCard[id];
    renderBoard();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function moveCard(id, newStage) {
  const c = pipeline.find(x => x.id === id);
  if (!c || c.stage === newStage) return;

  const moved_at = new Date().toISOString();
  try {
    const resp = await api(`/api/admin/pipeline-cards?id=${encodeURIComponent(id)}`, {
      method: 'PATCH',
      body: JSON.stringify({ stage: newStage, moved_at }),
    });
    const data = resp.item || resp;
    c.stage    = data.stage    || newStage;
    c.moved_at = data.moved_at || moved_at;
    renderBoard();
  } catch (e) {
    alert('Error: ' + e.message);
    // Revert visual state by reloading
    await loadPipeline(); renderBoard();
  }
}

// ============================================================
// DRAG & DROP
// ============================================================
function dragStart(e, id) {
  dragId = id;
  e.currentTarget.classList.add('dragging');
}
function dragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.col-body.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function dragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function dragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function drop(e, stage) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragId) moveCard(dragId, stage);
  dragId = null;
}

// ============================================================
// MODAL — Card detail + comments
// ============================================================
function openModal(id) {
  openCardId = id;
  renderModal();
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal() {
  openCardId = null;
  document.getElementById('modal-bg').classList.remove('show');
}

function renderModal() {
  const c = pipeline.find(x => x.id === openCardId);
  if (!c) { closeModal(); return; }
  const comments = commentsByCard[c.id] || [];

  const badges = [];
  if (c.quality != null)   badges.push(`<span class="b q">Q ${c.quality}</span>`);
  if (c.valuation != null) badges.push(`<span class="b v">V ${c.valuation}</span>`);
  if (c.irr)               badges.push(`<span class="b irr">IRR ${esc(c.irr)}</span>`);

  document.getElementById('modal').innerHTML = `
    <div class="modal-h">
      <div>
        <div class="tkr">${esc(c.ticker)}</div>
        <div class="nm">${esc(c.name)} · <span style="color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;font-size:10px;font-weight:600">${stageLabel(c.stage)}</span></div>
        ${badges.length ? `<div class="badges">${badges.join('')}</div>` : ''}
      </div>
      <button class="close" onclick="closeModal()">×</button>
    </div>

    <div class="modal-section">
      <h4>Note</h4>
      <textarea class="note-edit" id="note-edit">${esc(c.note || '')}</textarea>
      <button class="save-note" id="save-note-btn" onclick="saveNote()">Guardar nota</button>
    </div>

    <div class="modal-section">
      <h4>Comments (${comments.length})</h4>
      <div class="comments-list" id="comments-list">
        ${comments.length === 0
          ? `<div class="no-comments">Sin comentarios todavía. Sé el primero.</div>`
          : comments.map(commentHTML).join('')}
      </div>
      <div class="comment-form">
        <textarea id="new-comment" placeholder="Escribe un comentario…"></textarea>
        <button onclick="addComment()">Enviar</button>
      </div>
    </div>
  `;
}

function commentHTML(c) {
  const canDelete = (c.author_username || '').toLowerCase() === (currentUser.username || '').toLowerCase();
  const initials  = String(c.author_name || c.author_username || '?').trim().split(/\s+/).map(s => s[0]).slice(0,2).join('').toUpperCase();
  return `
    <div class="comment">
      <div class="avatar-circle">${esc(initials)}</div>
      <div class="comment-body">
        <div class="comment-h">
          <span class="auth">${esc(c.author_name || c.author_username)}</span>
          <span class="when">${fmtDateTime(c.created_at)}</span>
        </div>
        <div class="comment-text">${esc(c.body)}</div>
        ${canDelete ? `<button class="comment-del" onclick="deleteComment('${c.id}')">Eliminar</button>` : ''}
      </div>
    </div>
  `;
}

async function saveNote() {
  const newNote = document.getElementById('note-edit').value.trim();
  const c = pipeline.find(x => x.id === openCardId);
  if (!c) return;

  try {
    const resp = await api(`/api/admin/pipeline-cards?id=${encodeURIComponent(c.id)}`, {
      method: 'PATCH',
      body: JSON.stringify({ note: newNote || null }),
    });
    const data = resp.item || resp;
    c.note = (data && data.note !== undefined) ? data.note : (newNote || null);

    const btn = document.getElementById('save-note-btn');
    btn.textContent = '✓ Guardado';
    btn.classList.add('saved');
    setTimeout(() => { btn.textContent = 'Guardar nota'; btn.classList.remove('saved'); }, 1500);
    renderBoard();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function addComment() {
  const ta = document.getElementById('new-comment');
  const body = ta.value.trim();
  if (!body) return;

  try {
    const resp = await api('/api/admin/pipeline-comments', {
      method: 'POST',
      body: JSON.stringify({ card_id: openCardId, body }),
    });
    const data = resp.item || resp;
    if (!commentsByCard[openCardId]) commentsByCard[openCardId] = [];
    commentsByCard[openCardId].push(data);
    ta.value = '';
    renderModal();
    renderBoard();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function deleteComment(id) {
  if (!confirm('¿Eliminar este comentario?')) return;
  try {
    await api(`/api/admin/pipeline-comments?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
    commentsByCard[openCardId] = (commentsByCard[openCardId] || []).filter(c => c.id !== id);
    renderModal();
    renderBoard();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// ============================================================
// HELPERS
// ============================================================
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}
function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toISOString().slice(0, 10);
}
function fmtDateTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-CA') + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}
function stageLabel(id) {
  return (COLUMNS.find(c => c.id === id) || {}).title || id;
}

// ============================================================
// LIFT-OFF
// ============================================================
boot();
</script>
<script src="/search.js" defer></script>
</body>
