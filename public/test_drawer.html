<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --navy:#1b2642;--gold:#b88b47;--gold-lt:#d4aa6a;--gold-dim:rgba(184,139,71,0.10);--gold-rule:rgba(184,139,71,0.30);
    --cream:#f5f1eb;--white:#ffffff;--ink:#1b2642;--gray-mid:#8a9098;--gray-txt:#606060;
    --rule:rgba(27,38,66,0.09);
    --green:#2e6b4f;--red:#8b0000;--amber:#b88b47;--gray-bar:#606060;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);font-family:'Archivo','Helvetica Neue',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;padding:24px}
  .chip{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:6px 12px;background:var(--white);border:1px solid var(--rule);color:var(--gray-txt);cursor:pointer;transition:all .15s}
  .drawer-bg{position:fixed;inset:0;background:rgba(27,38,66,0.5);display:none;z-index:50}
  .drawer-bg.open{display:block}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(720px,90vw);background:var(--cream);border-left:3px solid var(--gold);overflow-y:auto;transform:translateX(100%);transition:transform .25s ease;z-index:60}
  .drawer.open{transform:translateX(0)}
  .drawer-header{background:var(--navy);color:var(--white);padding:18px 28px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--gold)}
  .drawer-title{font-size:22px;font-weight:700;letter-spacing:-0.01em}
  .drawer-close{background:none;border:1px solid rgba(255,255,255,0.3);color:var(--white);font-size:20px;width:32px;height:32px;cursor:pointer;line-height:1}
  .drawer-close:hover{border-color:var(--gold);color:var(--gold)}
  .drawer-body{padding:24px 28px}
  .field{margin-bottom:18px}
  .field-lbl{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--gray-mid);margin-bottom:6px}
  .field-val{font-size:13px}
  .meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;padding:14px;background:var(--white);border:1px solid var(--rule)}
  .k{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray-mid)}
  .v{font-size:14px;font-weight:600;margin-top:2px}
</style>
</head>
<body>
<h2 style="color:var(--navy);margin-bottom:16px">Test: Re-underwriting Drawer</h2>
<button onclick="openDrawer()" style="background:var(--navy);color:var(--white);border:none;padding:10px 20px;cursor:pointer;font-size:13px">Open LULU 10-K Drawer</button>

<div class="drawer-bg" id="drawer-bg" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true">
  <div class="drawer-header">
    <div class="drawer-title" id="drawer-title">—</div>
    <button class="drawer-close" onclick="closeDrawer()" aria-label="Close">×</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</aside>

<script>
function closeDrawer(){
  document.getElementById('drawer-bg').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function onOutcomeChange() {
  const outcomeRadio = document.querySelector('input[name="reund-outcome"]:checked');
  const outcome = outcomeRadio ? outcomeRadio.value : 'thesis_intact';
  const csWrap = document.getElementById('reund-changesummary-wrap');
  const ntWrap = document.getElementById('reund-newthesis-wrap');
  if (csWrap) csWrap.style.display = outcome === 'thesis_intact' ? 'none' : '';
  if (ntWrap) ntWrap.style.display = outcome === 'thesis_evolved' ? '' : 'none';
}
window.onOutcomeChange = onOutcomeChange;

function openDrawer() {
  document.getElementById('drawer-title').textContent = 'LULU · Re-underwriting';
  const body = document.getElementById('drawer-body');
  body.innerHTML = `
    <div class="meta-grid">
      <div><div class="k">Filing</div><div class="v">10-K</div></div>
      <div><div class="k">Period end</div><div class="v">Feb 1, 2026</div></div>
      <div><div class="k">Overdue</div><div class="v" style="color:#8b0000">51 days</div></div>
    </div>

    <div class="field">
      <div class="field-lbl">1. Is the thesis still valid? *</div>
      <textarea id="reund-thesis" rows="4" style="width:100%;padding:10px;border:1px solid var(--rule);background:var(--white);font-family:inherit;font-size:13px;resize:vertical" placeholder="What's still working / what changed since last review…"></textarea>
    </div>

    <div class="field">
      <div class="field-lbl">2. Kill criteria concerns (optional)</div>
      <textarea id="reund-killconcern" rows="2" style="width:100%;padding:10px;border:1px solid var(--rule);background:var(--white);font-family:inherit;font-size:13px;resize:vertical" placeholder="If a failure mode is getting closer, note it here…"></textarea>
    </div>

    <div class="field">
      <div class="field-lbl">3. Outcome del re-underwriting *</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px">
        <label class="chip" style="cursor:pointer;border-left:3px solid #3a8c5b;padding:8px 10px"><input type="radio" name="reund-outcome" value="thesis_intact" checked onchange="onOutcomeChange()" style="margin-right:6px"><strong>Tesis intacta</strong><div style="font-size:11px;color:var(--gray-mid);margin-top:2px">Sigue todo igual. Solo se firma.</div></label>
        <label class="chip" style="cursor:pointer;border-left:3px solid #c9a227;padding:8px 10px"><input type="radio" name="reund-outcome" value="thresholds_recalibrated" onchange="onOutcomeChange()" style="margin-right:6px"><strong>Thresholds recalibrados</strong><div style="font-size:11px;color:var(--gray-mid);margin-top:2px">Tesis sigue, ajustamos kill criteria.</div></label>
        <label class="chip" style="cursor:pointer;border-left:3px solid #c2641a;padding:8px 10px"><input type="radio" name="reund-outcome" value="thesis_evolved" onchange="onOutcomeChange()" style="margin-right:6px"><strong>Tesis evolucionó</strong><div style="font-size:11px;color:var(--gray-mid);margin-top:2px">Cambio material; comité ratifica.</div></label>
        <label class="chip" style="cursor:pointer;border-left:3px solid #9b2335;padding:8px 10px"><input type="radio" name="reund-outcome" value="thesis_broken" onchange="onOutcomeChange()" style="margin-right:6px"><strong>Tesis rota</strong><div style="font-size:11px;color:var(--gray-mid);margin-top:2px">Comité debe decidir SELL. Alerta automática.</div></label>
      </div>
    </div>

    <div class="field" id="reund-changesummary-wrap" style="display:none">
      <div class="field-lbl">3a. Justificación del cambio *</div>
      <textarea id="reund-changesummary" rows="3" style="width:100%;padding:10px;border:1px solid var(--rule);background:var(--white);font-family:inherit;font-size:13px;resize:vertical" placeholder="Por qué el contrato original cambia. Esta justificación queda inmutable en el audit trail."></textarea>
    </div>

    <div class="field" id="reund-newthesis-wrap" style="display:none">
      <div class="field-lbl">3b. Nueva thesis_summary (solo si tesis evolucionó, opcional)</div>
      <textarea id="reund-newthesis" rows="3" style="width:100%;padding:10px;border:1px solid var(--rule);background:var(--white);font-family:inherit;font-size:13px;resize:vertical" placeholder="Si la tesis se reformula, escribe la versión nueva aquí."></textarea>
    </div>

    <div class="field">
      <div class="field-lbl">4. Action *</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
        <label class="chip" style="cursor:pointer"><input type="radio" name="reund-action" value="buy_more" style="margin-right:6px">Buy more</label>
        <label class="chip" style="cursor:pointer"><input type="radio" name="reund-action" value="hold" checked style="margin-right:6px">Hold</label>
        <label class="chip" style="cursor:pointer"><input type="radio" name="reund-action" value="trim" style="margin-right:6px">Trim</label>
        <label class="chip" style="cursor:pointer"><input type="radio" name="reund-action" value="sell" style="margin-right:6px">Sell</label>
      </div>
    </div>

    <div class="field">
      <button id="reund-submit" style="background:var(--navy);color:var(--white);border:none;padding:11px 22px;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;font-weight:600">Submit re-underwriting</button>
    </div>
  `;
  document.getElementById('drawer-bg').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
</script>
</body>
</html>
