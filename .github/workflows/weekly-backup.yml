name: Weekly Database + Storage Backup

on:
  schedule:
    # Domingos 04:00 UTC (06:00 Madrid invierno / 23:00 Lima sábado)
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main repo (for migrations and scripts)
        uses: actions/checkout@v4
        with:
          path: dceh

      - name: Set up SSH for backups repo
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BACKUP_REPO_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts

      - name: Clone backups repo (via SSH deploy key)
        run: |
          git clone git@github.com:luisjosedelcid/dceh-backups.git backups

      - name: Install Postgres 17 client (matches Supabase server)
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          # Forzar v17 en PATH (Ubuntu trae v16 instalado por defecto)
          echo "/usr/lib/postgresql/17/bin" >> $GITHUB_PATH
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Set backup paths
        id: paths
        run: |
          STAMP=$(date -u +"%Y-%m-%d_%H%M")
          ISO_WEEK=$(date -u +"%G-W%V")
          BACKUP_DIR="backups/${ISO_WEEK}"
          mkdir -p "${BACKUP_DIR}"
          echo "stamp=${STAMP}" >> $GITHUB_OUTPUT
          echo "iso_week=${ISO_WEEK}" >> $GITHUB_OUTPUT
          echo "dir=${BACKUP_DIR}" >> $GITHUB_OUTPUT

      - name: Dump database (schema + data, public schema only)
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          DUMP_FILE="${{ steps.paths.outputs.dir }}/db_${{ steps.paths.outputs.stamp }}.sql"
          pg_dump "$DB_URL" \
            --schema=public \
            --no-owner \
            --no-privileges \
            --no-comments \
            --quote-all-identifiers \
            --format=plain \
            --file="$DUMP_FILE"
          gzip -9 "$DUMP_FILE"
          ls -lh "${DUMP_FILE}.gz"

      - name: Run storage backup script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKUP_DIR: ${{ steps.paths.outputs.dir }}
          STAMP: ${{ steps.paths.outputs.stamp }}
        run: |
          bash dceh/scripts/backup-storage.sh

      - name: Snapshot migration files
        run: |
          MIG_TAR="${{ steps.paths.outputs.dir }}/migrations_${{ steps.paths.outputs.stamp }}.tar.gz"
          tar -czf "$MIG_TAR" -C dceh supabase 2>/dev/null || true
          if [ -d dceh/migrations ]; then
            tar -czf "${MIG_TAR%.tar.gz}_extra.tar.gz" -C dceh migrations
          fi
          ls -lh "$MIG_TAR" 2>/dev/null || true

      - name: Write README for this snapshot
        run: |
          README_FILE="${{ steps.paths.outputs.dir }}/README.md"
          cat > "$README_FILE" <<EOF
          # Backup ${{ steps.paths.outputs.iso_week }}

          Generated: ${{ steps.paths.outputs.stamp }} UTC
          Source: Supabase project mlmmcciknvydlekztqtj (DCE Holdings, eu-west-1, Pro)

          ## Contents
          - db_*.sql.gz  -- pg_dump del schema public (data + DDL)
          - storage_*.tar.gz  -- objetos de buckets reports + study
          - storage_manifest_*.json  -- metadatos JSON
          - migrations_*.tar.gz  -- snapshot de migraciones del repo

          ## Restore rapido
          \`\`\`
          gunzip -c db_*.sql.gz | psql "\$NEW_DB_URL"
          \`\`\`

          Ver RUNBOOK_DR.md en repo dceh para procedimiento completo.
          EOF

      - name: Purge old backups (keep last 8 weeks)
        working-directory: backups
        run: |
          dirs=$(ls -d 20*-W* 2>/dev/null | sort -r)
          count=0
          for d in $dirs; do
            count=$((count+1))
            if [ $count -gt 8 ]; then
              echo "Purging $d"
              rm -rf "$d"
            fi
          done

      - name: Commit and push to backups repo
        working-directory: backups
        run: |
          git config user.email "luis@dceholdings.com"
          git config user.name "DCE Backup Bot"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "backup: ${{ steps.paths.outputs.iso_week }} (${{ steps.paths.outputs.stamp }})"
            git push
          fi

      - name: Summary
        run: |
          echo "Backup complete for week ${{ steps.paths.outputs.iso_week }}"
          du -sh backups/${{ steps.paths.outputs.iso_week }}/* 2>/dev/null || true
